name: Continuous Wind Scrape
on:
  schedule:
    # Temporal Alignment: Synchronized to BoM's strict 10-minute update cycle
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        # CRITICAL FIX: beautifulsoup4 library added to the server environment
        run: pip install requests gspread google-auth beautifulsoup4
      - name: Run scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python scrape_wind.py
